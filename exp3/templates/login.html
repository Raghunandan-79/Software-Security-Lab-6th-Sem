<!DOCTYPE html>
<html>
<head>
    <title>Secure Login</title>

    <style>

        body {
            font-family: Arial;
            background: #121921;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: #1e2a38;
            padding: 30px;
            border-radius: 10px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            padding: 10px;
            width: 100%;
            background: #00adb5;
            color: white;
            border: none;
        }

    </style>

</head>

<body>

<div class="box">

<h2>Login Page</h2>

<form method="POST">

<input type="text" name="username" placeholder="Enter username" required>

<input type="password" name="password" placeholder="Enter password" required>

<button type="submit">Login</button>

</form>

<p>{{ message }}</p>

</div>

</body>
</html>
